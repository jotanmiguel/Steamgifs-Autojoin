name: SteamGifts Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # rodar a cada 6h

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build and start containers
        run: |
          docker compose build --no-cache
          docker compose up -d

      - name: Check logs
        run: docker logs -f steamgifts-bot
