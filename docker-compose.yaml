version: "3.8"

services:

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    shm_size: 1gb

  steamgifts-bot:
    image: ghcr.io/jotanmiguel/steamgifs-autojoin:master
    container_name: steamgifts-bot
    restart: unless-stopped
    depends_on:
      - flaresolverr
    entrypoint: ["/app/wait-for-fsr.sh", "python", "main.py"]
